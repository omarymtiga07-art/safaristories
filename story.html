<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ destination.title }} - Safari Stories</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #FAF9F6; color: #212529; line-height: 1.8; }
        
        header { background-color: #2E5A44; padding: 20px; text-align: center; }
        header a { color: white; text-decoration: none; font-weight: bold; font-size: 20px; }

        .story-hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), url('{{ destination.image }}') no-repeat center center/cover;
            height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .story-hero h1 { font-size: 42px; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        .story-hero p { font-size: 18px; font-style: italic; color: #D4A373; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); }

        .content { max-width: 800px; margin: 40px auto; padding: 0 20px; font-size: 18px; }
        
        .back-btn { display: inline-block; background-color: #2E5A44; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 30px; }
        .back-btn:hover { background-color: #D4A373; }
        footer { background-color: #212529; color: #a0a0a0; text-align: center; padding: 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <a href="/">← Safari Stories</a>
    </header>

    <div class="story-hero">
        <h1>{{ destination.title }}</h1>
        <p>{{ destination.subtitle }}</p>
    </div>

    <main class="content">
        <p>{{ destination.story }}</p>
        <a href="/" class="back-btn">Back to Homepage</a>
    </main>

    <footer>
        <p>&copy; 2026 Safari Stories.</p>
    </footer>

</body>
</html>
